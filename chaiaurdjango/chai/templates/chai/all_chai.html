{% extends "layout.html" %}

{% block title %}
   Chaipage
{% endblock %}

{% block content %}
    <h1>All chai for you</h1> 
    {% for chai in chais %}
        <div class="chai-item">
            <img src="{{chai.image.url}}" alt="">
            <h3>{{chai.name}}</h3>
        </div>
        <a href="{% url 'chai_detail' chai.id %}" class="btn btn-primary btn-lg active" role="button" aria-pressed="true">Primary link</a>
    {% endfor %}
{% endblock %}
