{% extends 'shopping.html' %}

{% block title %}
    Login page
{% endblock %}

{% block content %}
<form>

    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" aria-describedby="usernameHelp"           placeholder="Enter your username">
        <div id="usernameHelp" class="form-text">Choose a unique username.</div>
    </div>


    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
      <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
    </div>

    <div class="mb-3">
        <label for="phoneNumber" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phoneNumber" aria-describedby="phoneHelp" placeholder="Enter your phone number">
    </div> 

    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Password</label>
      <input type="password" class="form-control" id="exampleInputPassword1">
    </div>

    <button type="submit" class="btn btn-primary">login</button>

    <p>Don't have an account:<a href="{% url 'register' %}">register</a></p>

  </form>
{% endblock %}
